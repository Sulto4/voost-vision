<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="55%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg3)"/>
  <rect x="120" y="100" width="1360" height="660" rx="40" fill="#020617" fill-opacity="0.22" stroke="#fff" stroke-opacity="0.12"/>
  <!-- React atom icon - left side, contained -->
  <g transform="translate(340, 420)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#a7f3d0" stroke-width="14" stroke-opacity="0.3"/>
    <circle cx="0" cy="0" r="20" fill="#a7f3d0"/>
    <ellipse cx="0" cy="0" rx="130" ry="50" fill="none" stroke="#a7f3d0" stroke-width="8" stroke-opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="50" ry="130" fill="none" stroke="#a7f3d0" stroke-width="8" stroke-opacity="0.6"/>
  </g>
  <!-- Text - right side, properly spaced -->
  <text x="580" y="320" fill="#ecfdf5" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700">React + Supabase</text>
  <text x="580" y="400" fill="#d1fae5" font-family="Arial, Helvetica, sans-serif" font-size="28" fill-opacity="0.85">Stack rapid pentru MVP-uri,</text>
  <text x="580" y="440" fill="#d1fae5" font-family="Arial, Helvetica, sans-serif" font-size="28" fill-opacity="0.85">autentificare si baze de date</text>
  <!-- Feature pills -->
  <rect x="580" y="490" width="140" height="40" rx="20" fill="#34d399" fill-opacity="0.2" stroke="#34d399" stroke-opacity="0.4"/>
  <text x="650" y="516" fill="#a7f3d0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">Auth</text>
  <rect x="740" y="490" width="160" height="40" rx="20" fill="#34d399" fill-opacity="0.2" stroke="#34d399" stroke-opacity="0.4"/>
  <text x="820" y="516" fill="#a7f3d0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">Real-time</text>
  <rect x="920" y="490" width="140" height="40" rx="20" fill="#34d399" fill-opacity="0.2" stroke="#34d399" stroke-opacity="0.4"/>
  <text x="990" y="516" fill="#a7f3d0" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">Storage</text>
  <text x="140" y="820" fill="#d1fae5" font-family="Arial, Helvetica, sans-serif" font-size="24" letter-spacing="5" fill-opacity="0.7">VOOST VISION • DEVELOPMENT</text>
