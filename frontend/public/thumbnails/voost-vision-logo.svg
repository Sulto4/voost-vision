<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff6b8a"/>
      <stop offset="100%" stop-color="#ff8ca0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#logoGrad)"/>
  <circle cx="400" cy="160" r="8" fill="url(#accentGrad)"/>
  <text x="400" y="240" fill="#ffffff" font-family="'Sora', Arial, Helvetica, sans-serif" font-size="64" font-weight="600" text-anchor="middle" letter-spacing="-1">Voost <tspan fill="#d4d4e0">Vision</tspan></text>
  <text x="400" y="290" fill="#9ca3af" font-family="Arial, Helvetica, sans-serif" font-size="20" text-anchor="middle" letter-spacing="8">DIGITAL AGENCY</text>
</svg>
